name: Sitemap Monitor
on:
  schedule:
    - cron: '*/15 * * * *'
    - cron: '10 12 * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check sitemaps and notify
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          URLS=(
            "https://www.sktthemes.org/sitemap_index.xml"
            "https://www.shreekrishnabanquets.com/sitemap_index.xml"
            "https://www.pinnaclethemes.net/sitemap_index.xml"
            "https://www.shrikrishnatechnologies.com/sitemap_index.xml"
            "https://www.themes21.net/sitemap_index.xml"
          )

          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"

          send () {
            curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${CHAT_ID}" \
              --data-urlencode "text=$1" > /dev/null || true
          }

          check_url () {
            local url="$1" status body
            for attempt in 1 2 3; do
              RESPONSE=$(curl -s -L --compressed --max-time 30 \
                -A "$UA" -w "\n%{http_code}" "$url" || true)
              status=$(echo "$RESPONSE" | tail -n1)
              body=$(echo "$RESPONSE" | sed '$d')
              if [ "$status" = "200" ] && echo "$body" | grep -Eiq "(sitemapindex|urlset)"; then
                echo "${status}|OK"; return
              fi
              sleep $((attempt * 5))
            done
            echo "${status}|FAIL"
          }

          DAILY="no"
          if [ "$SCHEDULE" = "10 12 * * *" ] || [ -z "$SCHEDULE" ]; then
            DAILY="yes"
          fi

          SUMMARY=""
          for URL in "${URLS[@]}"; do
            RESULT=$(check_url "$URL")
            STATUS="${RESULT%%|*}"
            VERDICT="${RESULT##*|}"
            echo "Checked $URL -> $STATUS ($VERDICT)"
            if [ "$VERDICT" = "FAIL" ]; then
              send "$(printf '🔴 ALERT — sitemap is DOWN\nStatus code: %s\n%s' "$STATUS" "$URL")"
              SUMMARY="${SUMMARY}🔴 ${URL} (${STATUS})"$'\n'
            else
              SUMMARY="${SUMMARY}🟢 ${URL}"$'\n'
            fi
          done

          if [ "$DAILY" = "yes" ]; then
            send "$(printf 'Daily sitemap report:\n%s' "$SUMMARY")"
          fi

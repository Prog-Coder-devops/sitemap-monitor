name: Sitemap Monitor
on:
  schedule:
    - cron: '*/5 * * * *'
    - cron: '0 4 * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check sitemap and notify
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          URL: https://www.sktthemes.org/this-does-not-exist.xml
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          echo "BOT_TOKEN length: ${#BOT_TOKEN}"
          echo "CHAT_ID length: ${#CHAT_ID}"
          RESPONSE=$(curl -s -L --max-time 30 -w "\n%{http_code}" "$URL")
          STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP status: $STATUS"

          send () {
            RESULT=$(curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${CHAT_ID}" \
              --data-urlencode "text=$1")
            echo "Telegram response: $RESULT"
          }

          if [ "$STATUS" != "200" ] || ! echo "$BODY" | grep -q "sitemapindex"; then
            send "$(printf '🔴 ALERT — sitemap is DOWN\nStatus code: %s\n%s' "$STATUS" "$URL")"
          elif [ "$SCHEDULE" = "0 4 * * *" ]; then
            send "$(printf '🟢 Daily check — sitemap is fine (200 OK)\n%s' "$URL")"
          fi

name: Sitemap Monitor
on:
  schedule:
    - cron: '*/5 * * * *'
    - cron: '10 12 * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check sitemaps and notify
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          URLS=(
            "https://www.sktthemes.org/sitemap_index.xml"
            "https://www.shreekrishnabanquets.com/sitemap_index.xml"
            "https://www.pinnaclethemes.net/sitemap_index.xml"
            "https://www.shrikrishnatechnologies.com/sitemap_index.xml"
            "https://www.themes21.net/sitemap_index.xml"
          )

          send () {
            curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${CHAT_ID}" \
              --data-urlencode "text=$1" > /dev/null || true
          }

          DAILY="no"
          if [ "$SCHEDULE" = "10 12 * * *" ] || [ -z "$SCHEDULE" ]; then
            DAILY="yes"
          fi

          SUMMARY=""
          for URL in "${URLS[@]}"; do
            RESPONSE=$(curl -s -L --max-time 30 -w "\n%{http_code}" "$URL" || true)
            STATUS=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            echo "Checked $URL -> $STATUS"

            if [ "$STATUS" != "200" ] || ! echo "$BODY" | grep -q "sitemapindex"; then
              send "$(printf '🔴 ALERT — sitemap is DOWN\nStatus code: %s\n%s' "$STATUS" "$URL")"
              SUMMARY="${SUMMARY}🔴 ${URL} (${STATUS})"$'\n'
            else
              SUMMARY="${SUMMARY}🟢 ${URL}"$'\n'
            fi
          done

          if [ "$DAILY" = "yes" ]; then
            send "$(printf 'Daily sitemap report:\n%s' "$SUMMARY")"
          fi
